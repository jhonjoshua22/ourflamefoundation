name: Hourly Social Sync

on:
  schedule:
    - cron: '0 * * * *'      # Every hour (at :00)
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # Cache node_modules for faster runs

      # Install only the needed lightweight packages
      - name: Install Dependencies
        run: |
          npm ci
          npm install axios cheerio @supabase/supabase-js

      # Run the sync script
      - name: Run Social Stats Sync
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node sync.js

      # Optional: Notify on failure (e.g. send to Slack/Discord if you want later)
      - name: Notify on Failure
        if: failure()
        run: |
          echo "Sync failed! Check logs."
          # Add curl to Slack webhook or similar if desired
