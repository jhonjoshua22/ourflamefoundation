name: Hourly Social Sync

on:
  schedule:
    - cron: '0 * * * *'      # Every hour
  workflow_dispatch:         # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # We use 'npm install' instead of 'npm ci' to avoid the lockfile sync error
      - name: Install Dependencies
        run: |
          npm install @google/generative-ai @supabase/supabase-js playwright
          npx playwright install chromium --with-deps

      - name: Run Social Stats Sync
        env:
          # These must match the names in your GitHub Secrets exactly
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node sync.js

      - name: Notify on Failure
        if: failure()
        run: echo "Sync failed! Check the 'Run Social Stats Sync' logs for details."
